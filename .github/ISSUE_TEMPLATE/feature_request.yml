name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Check existing issues and discussions first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include API sketches if helpful.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AgentLoop
        - LLM providers
        - Tool system
        - React hooks
        - TypeScript types
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
