name: Bug Report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create AgentLoop with CloudProvider
        2. Call loop.run('...')
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction
      description: A minimal code snippet that demonstrates the issue.
      render: typescript

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: rn_version
    attributes:
      label: React Native version
      placeholder: e.g. 0.76.5
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: e.g. Pixel 8 Pro, Android 15
